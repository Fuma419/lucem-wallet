name: Test and Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Generates Secrets File
        run: |
          echo "export default { PROJECT_ID_MAINNET: '${{ secrets.PROJECT_ID_MAINNET  }}', PROJECT_ID_PREVIEW: '${{ secrets.PROJECT_ID_PREVIEW  }}', PROJECT_ID_PREPROD: '${{ secrets.PROJECT_ID_PREPROD  }}', POSTHOG_API_KEY:'${{ secrets.POSTHOG_API_KEY }}', POSTHOG_PROJECT_ID: '${{ secrets.POSTHOG_PROJECT_ID }}', LACE_EXTENSION_ID: '${{ secrets.LACE_EXTENSION_ID }}'};" > secrets.production.js
      - name: Build
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Headless UI screenshots
        run: npm run test:screenshots:only
      # Optional live Preprod send: uncomment and add repo secrets LUCEM_INTEGRATION_PREPROD_MNEMONIC (+ KOIOS_API_KEY_PREPROD if needed).
      # - name: Preprod send integration
      #   run: npm run test:integration
      #   env:
      #     LUCEM_INTEGRATION_PREPROD_MNEMONIC: ${{ secrets.LUCEM_INTEGRATION_PREPROD_MNEMONIC }}
      #     KOIOS_API_KEY_PREPROD: ${{ secrets.KOIOS_API_KEY_PREPROD }}
      - name: Upload UI screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: e2e/screenshots/output/
          if-no-files-found: ignore
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
