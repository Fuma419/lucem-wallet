name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick checks (unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

  heavy:
    name: Build + UI screenshots (self-hosted)
    # Temporarily disabled until self-hosted runner capacity is stable.
    if: ${{ false }}
    needs: quick
    runs-on: [self-hosted, linux]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build:webpack

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Headless UI screenshots
        run: npx playwright test e2e/screenshots.spec.js --retries=1

      - name: Upload UI screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: e2e/screenshots/output/
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build
          path: build
          if-no-files-found: ignore
          retention-days: 3
